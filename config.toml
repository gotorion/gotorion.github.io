title = "gotorion"
base_url = "/"
description = "gotorion, what are you thinking?"
theme = 'zola-bearblog'
compile_sass = false

build_search_index = false

taxonomies = [
  { name = "categories", feed = true },
  { name = "tags", feed = true },
]

default_language = "en"

[translations]
no_posts = "No posts yet"
remove_filter = "Remove filter"
filtering_for = "Filtering for"
made_with = "Made with"
table_of_contents = "Table of contents"
language = "language"
site = "site"
[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true
render_emoji = true
[extra]
date_format = "%Y-%m-%d"
webserver_sends_csp_headers = true
hide_made_with_line = true
language_switcher = true
translations = [
  { code = "en", name = "English" },
  { code = "zh", name = "Chinese" },
]

favicon = "./favicon.png"

[extra.table_of_contents]
show = false
max_level = 2
visible_on_load = true

[[extra.main_menu]]
name = "Home"
url = "@/_index.md"

[[extra.main_menu]]
name = "Resume"
url = "@/resume.md"

[[extra.main_menu]]
name = "Project"
url = "@/project.md"

[[extra.main_menu]]
name = "Blog"
url = "@/blog/_index.md"
